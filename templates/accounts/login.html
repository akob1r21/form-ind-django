{% extends "base.html" %}

{% block title %}Sign in - Northline Market{% endblock %}

{% block main %}
    <section class="auth-page container">
        <div class="auth-card">
            <h1 class="detail-title">Welcome back</h1>
            <p class="detail-description">Sign in to manage the catalog and keep your products looking sharp.</p>
            <form class="form-grid" action="" method="post">
                {% csrf_token %}
                <p>
                    <label for="username">Username</label>
                    <input id="username" required type="text" name="username" autocomplete="username" placeholder="Your username">
                </p>

                <p>
                    <label for="password">Password</label>
                    <input id="password" required type="password" name="password" autocomplete="current-password">
                </p>

                <button class="button-primary" type="submit">Sign in</button>
            </form>

            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}
        </div>
    </section>

{% endblock %}
